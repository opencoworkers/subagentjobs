<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>subagentdata · wc2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--s1:#111;--border:#222;--border2:#2a2a2a;--cyan:#00b4d8;--cyan2:#48cae4;--cyan-mute:#003d5b;--green:#22c55e;--red:#ef4444;--text:#e8e8e8;--text2:#888;--text3:#444;--mono:'DM Mono',ui-monospace,monospace}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100dvh;overflow-x:hidden}
header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(13,13,13,.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.logo{font-size:14px;font-weight:500;letter-spacing:-.01em}.badge{font-size:10px;color:var(--cyan);letter-spacing:.04em}
.live-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;font-size:10px;letter-spacing:.1em;color:var(--text2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 16px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);white-space:nowrap;cursor:pointer;border:none;background:none;font-family:var(--mono);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;flex-shrink:0}
.nav-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.view{display:none}.view.active{display:block}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 10px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);border-bottom:1px solid var(--border)}
.sec-hdr span{color:var(--text3)}
.graph-meta{padding:8px 16px;font-size:9px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;display:flex;gap:14px;border-bottom:1px solid var(--border)}
.graph-wrap{width:100%;aspect-ratio:1;max-height:calc(100dvh - 130px);overflow:hidden;position:relative;background:var(--bg)}
#gpuCanvas{width:100%;height:100%;display:block;touch-action:none}
#labelCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;padding:11px 16px;font-size:9px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;border-top:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:5px}.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#cards-wrap{padding:8px 12px 24px}
.match-card{border:1px solid var(--border);background:var(--s1);padding:11px 13px;margin-bottom:8px;position:relative;overflow:hidden}
.match-card.live{border-color:var(--red);background:#1a0808}.match-card.done{border-color:var(--border2)}
.card-meta{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.card-meta .ltag{color:var(--red);font-weight:500}
.team{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px}
.team .flag{font-size:16px;line-height:1;flex-shrink:0}.team .name{flex:1;letter-spacing:.01em}
.team .sc{font-size:14px;font-weight:500;color:var(--cyan);min-width:16px;text-align:right}
.team .sc.p{font-size:10px;color:var(--text3)}
.team.won .name{color:var(--cyan2);font-weight:500}.team.lost .name{color:var(--text3)}
.sep{height:1px;background:var(--border);margin:3px 0}
.pbar{height:1.5px;background:var(--border2);margin-top:9px;overflow:hidden}
.pfill{height:100%;background:var(--cyan);opacity:.7}
.ft-pip{position:absolute;top:0;right:0;font-size:8px;letter-spacing:.08em;padding:2px 6px;background:var(--cyan-mute);color:var(--cyan);text-transform:uppercase}
.live-pip{position:absolute;top:0;right:0;font-size:8px;letter-spacing:.08em;padding:2px 6px;background:#3a0a0a;color:var(--red);text-transform:uppercase;animation:blink 1.2s ease-in-out infinite}
.note-pip{position:absolute;top:0;left:0;font-size:8px;letter-spacing:.06em;padding:2px 6px;background:#1a1a0a;color:#888;text-transform:uppercase}
footer{border-top:1px solid var(--border);padding:14px 16px;font-size:9px;color:var(--text3);letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
footer a{color:var(--text2);text-decoration:none}
#gpu-badge{font-size:8px;letter-spacing:.1em;padding:2px 6px;border:1px solid #1a3a1a;color:#22c55e;text-transform:uppercase;margin-left:8px;opacity:0;transition:opacity .5s}
#gpu-badge.on{opacity:1}
.updated-tag{font-size:8px;color:var(--text3);margin-left:auto;letter-spacing:.04em}
</style>
</head>
<body>
<header>
  <span class="logo">subagentdata</span>
  <span class="badge">wc2026</span>
  <span id="gpu-badge">webgpu</span>
  <div class="live-wrap"><span class="live-dot"></span>LIVE</div>
</header>
<nav>
  <button class="nav-tab active" data-view="radial">graph</button>
  <button class="nav-tab" data-view="matches">matches</button>
</nav>
<main>
  <div id="view-radial" class="view active">
    <div class="sec-hdr">ROUND OF 32 · RADIAL BRACKET<span id="done-count"></span></div>
    <div class="graph-meta"><span id="render-mode">CANVAS 2D</span><span>PINCH TO ZOOM</span><span>TAP MATCH</span><span id="upd-ts" class="updated-tag"></span></div>
    <div class="graph-wrap"><canvas id="gpuCanvas"></canvas><canvas id="labelCanvas"></canvas></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#00b4d8"></div>Upcoming</div>
      <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div>Advanced</div>
      <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>Live now</div>
      <div class="leg-item"><div class="leg-dot" style="background:#333"></div>Eliminated</div>
    </div>
  </div>
  <div id="view-matches" class="view">
    <div class="sec-hdr">ALL 16 MATCHES<span id="mc">—</span></div>
    <div id="cards-wrap"></div>
  </div>
</main>
<footer><span>subagentdata.com</span><a href="https://coworkers.subagentknowledge.com">coworkers ↗</a></footer>
<script>
(function(){
'use strict';
var DATA=null,gpuDevice=null,gpuCtx=null,useWebGPU=false;
var pan={x:0,y:0},zoom=1,nodes=[],edges=[];
var lastTouch=null,lastDist=null,isPinch=false,liveBlinkT=0,gpuPipes=null;

async function load(){
  try{var r=await fetch('/api/bracket');DATA=await r.json();}
  catch(e){DATA={matches:[],r16:[],meta:{}};}
  if(DATA.meta&&DATA.meta.updated){
    var d=new Date(DATA.meta.updated);
    document.getElementById('upd-ts').textContent='UPDATED '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
  await initRenderer();
  buildCards();
  var done=DATA.matches.filter(function(m){return m.status==='final';}).length;
  var live=DATA.matches.filter(function(m){return m.status==='in_progress';}).length;
  document.getElementById('done-count').textContent=done+' DONE'+(live?' · '+live+' LIVE':'');
  document.getElementById('mc').textContent=DATA.matches.length;
}

document.querySelectorAll('.nav-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
    if(tab.dataset.view==='radial') requestAnimationFrame(resize);
  });
});

function buildCards(){
  var wrap=document.getElementById('cards-wrap');
  DATA.matches.forEach(function(m){
    var done=m.status==='final',live2=m.status==='in_progress';
    var hc=done?(m.w===m.home.c?'won':'lost'):'';
    var ac=done?(m.w===m.away.c?'won':'lost'):'';
    var hs=done||live2?'<span class="sc">'+m.s.h+'</span>':'<span class="sc p">—</span>';
    var as2=done||live2?'<span class="sc">'+m.s.a+'</span>':'<span class="sc p">—</span>';
    var prob=(!done&&!live2&&m.p)?'<div class="pbar"><div class="pfill" style="width:'+Math.round(m.p.h)+'%"></div></div>':'';
    var pip=done?'<span class="ft-pip">FT</span>':live2?'<span class="live-pip">LIVE</span>':'';
    var note=m.note?'<span class="note-pip">'+m.note+'</span>':'';
    var d=document.createElement('div');
    d.className='match-card'+(done?' done':live2?' live':'');
    d.innerHTML=pip+note+
      '<div class="card-meta"><span>'+m.id+' · '+m.date+'</span>'+(live2?'<span class="ltag">LIVE</span>':'<span>'+m.v+'</span>')+'</div>'+
      '<div class="team '+hc+'"><span class="flag">'+m.home.f+'</span><span class="name">'+m.home.n+'</span>'+hs+'</div>'+
      '<div class="sep"></div>'+
      '<div class="team '+ac+'"><span class="flag">'+m.away.f+'</span><span class="name">'+m.away.n+'</span>'+as2+'</div>'+prob;
    wrap.appendChild(d);
  });
}

async function initRenderer(){
  var gpuCanvas=document.getElementById('gpuCanvas');
  if(navigator.gpu){
    try{
      var adapter=await navigator.gpu.requestAdapter({powerPreference:'high-performance'});
      gpuDevice=await adapter.requestDevice();
      gpuCtx=gpuCanvas.getContext('webgpu');
      var fmt=navigator.gpu.getPreferredCanvasFormat();
      gpuCtx.configure({device:gpuDevice,format:fmt,alphaMode:'premultiplied'});
      useWebGPU=true;
      document.getElementById('gpu-badge').classList.add('on');
      var hasImm=navigator.gpu.wgslLanguageFeatures&&navigator.gpu.wgslLanguageFeatures.has('immediate_address_space');
      document.getElementById('render-mode').textContent=hasImm?'WEBGPU + IMMEDIATES':'WEBGPU';
    }catch(e){useWebGPU=false;}
  }
  if(!useWebGPU){gpuCanvas.getContext('2d');}
  setupInteraction();
  resize();
  startLoop();
}

function buildGraph(W,H){
  if(!DATA||!DATA.matches.length)return;
  nodes=[];edges=[];
  var cx=W/2,cy=H/2,R=Math.min(W,H)*0.38,M=DATA.matches,n=M.length;
  M.forEach(function(m,i){
    var ang=(i/n)*Math.PI*2-Math.PI/2;
    var done=m.status==='final',live2=m.status==='in_progress';
    nodes.push({id:m.id,x:cx+Math.cos(ang)*R,y:cy+Math.sin(ang)*R,ang:ang,match:m,done:done,live:live2,sz:done?8:live2?10:6});
  });
  nodes.push({id:'_t',x:cx,y:cy,trophy:true,sz:0});
  nodes.filter(function(nd){return !nd.trophy;}).forEach(function(nd){
    edges.push({a:'_t',b:nd.id,type:nd.done?'done':nd.live?'live':'pending'});
  });
  if(DATA.r16)DATA.r16.forEach(function(pair){edges.push({a:pair[0],b:pair[1],type:'r16'});});
}
function gn(id){return nodes.find(function(n){return n.id===id;});}

function renderCanvas2D(W,H,blink){
  var c=document.getElementById('gpuCanvas'),ctx=c.getContext('2d');
  if(!ctx)return;
  var dpr=window.devicePixelRatio||1;
  ctx.clearRect(0,0,W*dpr,H*dpr);
  ctx.save();ctx.scale(dpr,dpr);
  ctx.translate(pan.x,pan.y);ctx.scale(zoom,zoom);
  var cx=W/2,cy=H/2,R=Math.min(W,H)*0.38;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,R*0.62,0,Math.PI*2);ctx.strokeStyle='#181818';ctx.lineWidth=1;ctx.setLineDash([2,6]);ctx.stroke();ctx.setLineDash([]);
  edges.filter(function(e){return e.type==='r16';}).forEach(function(e){
    var na=gn(e.a),nb=gn(e.b);if(!na||!nb)return;
    var Rr=R*0.62,a1=na.ang,a2=nb.ang,diff=a2-a1;
    if(diff>Math.PI)diff-=Math.PI*2;if(diff<-Math.PI)diff+=Math.PI*2;
    ctx.beginPath();diff>=0?ctx.arc(cx,cy,Rr,a1,a1+diff):ctx.arc(cx,cy,Rr,a1,a1+diff,true);
    ctx.strokeStyle='#1a2d1a';ctx.lineWidth=1.5;ctx.stroke();
  });
  edges.filter(function(e){return e.type!=='r16';}).forEach(function(e){
    var nb=gn(e.b);if(!nb)return;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nb.x,nb.y);
    ctx.strokeStyle=e.type==='done'?'#0d3d1a':e.type==='live'?'#3a0808':'#1a1a1a';ctx.lineWidth=1;ctx.stroke();
  });
  nodes.filter(function(nd){return !nd.trophy;}).forEach(function(nd){
    var m=nd.match,alpha=nd.live?(0.6+0.4*blink):1;
    ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(nd.x,nd.y,nd.sz,0,Math.PI*2);
    ctx.fillStyle=nd.live?'#2a0808':nd.done?'#081a0f':'#111';ctx.fill();
    ctx.strokeStyle=nd.live?'#ef4444':nd.done?'#22c55e':'#333';ctx.lineWidth=1.2;ctx.stroke();
    ctx.globalAlpha=1;
  });
  ctx.restore();
}

function renderLabels(W,H,blink){
  var lc=document.getElementById('labelCanvas'),lctx=lc.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  lctx.clearRect(0,0,W*dpr,H*dpr);
  lctx.save();lctx.scale(dpr,dpr);
  var cx=W/2,cy=H/2,R=Math.min(W,H)*0.38;
  lctx.font='18px serif';lctx.textAlign='center';lctx.textBaseline='middle';
  lctx.fillText('🏆',cx+pan.x,cy+pan.y-4);
  lctx.font='300 6px DM Mono,monospace';lctx.fillStyle='#2a2a2a';
  lctx.fillText('FINAL · JUL 19',cx+pan.x,cy+pan.y+11);
  nodes.filter(function(nd){return !nd.trophy;}).forEach(function(nd){
    var m=nd.match;
    var perp=nd.ang+Math.PI/2,lr=R*zoom+28;
    var lx=cx*zoom+pan.x+Math.cos(nd.ang)*lr;
    var ly=cy*zoom+pan.y+Math.sin(nd.ang)*lr;
    var off=10;
    var hx=lx+Math.cos(perp)*off,hy=ly+Math.sin(perp)*off;
    var ax=lx-Math.cos(perp)*off,ay=ly-Math.sin(perp)*off;
    var hWon=nd.done&&m.w===m.home.c,hLost=nd.done&&!hWon;
    var aWon=nd.done&&m.w===m.away.c,aLost=nd.done&&!aWon;
    lctx.font=(hWon?'500':'300')+' 8px DM Mono,monospace';lctx.textAlign='center';lctx.textBaseline='middle';
    lctx.fillStyle=hWon?'#00b4d8':hLost?'#252525':'#555';
    lctx.fillText(m.home.f+' '+m.home.c,hx,hy);
    lctx.font=(aWon?'500':'300')+' 8px DM Mono,monospace';
    lctx.fillStyle=aWon?'#00b4d8':aLost?'#252525':'#555';
    lctx.fillText(m.away.f+' '+m.away.c,ax,ay);
    if((nd.done||nd.live)&&m.s){
      var px=nd.x*zoom+pan.x,py=nd.y*zoom+pan.y;
      lctx.font='500 '+(nd.sz*zoom*0.85)+'px DM Mono,monospace';
      lctx.fillStyle=nd.done?'#00b4d8':'#ef4444';
      lctx.textAlign='center';lctx.textBaseline='middle';
      lctx.fillText(m.s.h+'-'+m.s.a,px,py);
    }
  });
  lctx.restore();
}

function render(W,H,blink){
  if(!W){var wrap=document.querySelector('.graph-wrap');W=wrap.clientWidth;H=wrap.clientHeight;}
  blink=blink||0.8;
  renderCanvas2D(W,H,blink);
  renderLabels(W,H,blink);
}

function resize(){
  var wrap=document.querySelector('.graph-wrap');
  var W=wrap.clientWidth,H=wrap.clientHeight,dpr=window.devicePixelRatio||1;
  var gc=document.getElementById('gpuCanvas'),lc=document.getElementById('labelCanvas');
  gc.width=Math.round(W*dpr);gc.height=Math.round(H*dpr);gc.style.width=W+'px';gc.style.height=H+'px';
  lc.width=Math.round(W*dpr);lc.height=Math.round(H*dpr);lc.style.width=W+'px';lc.style.height=H+'px';
  var ctx2=gc.getContext('2d');if(ctx2&&!useWebGPU)ctx2.setTransform(dpr,0,0,dpr,0,0);
  var lctx=lc.getContext('2d');if(lctx)lctx.setTransform(dpr,0,0,dpr,0,0);
  buildGraph(W,H);render(W,H);
}

var lastT=0;
function startLoop(){
  requestAnimationFrame(function frame(t){
    var dt=(t-lastT)/1000;lastT=t;liveBlinkT+=dt;
    var blink=0.5+0.5*Math.sin(liveBlinkT*Math.PI*1.2);
    var wrap=document.querySelector('.graph-wrap');
    if(wrap)render(wrap.clientWidth,wrap.clientHeight,blink);
    requestAnimationFrame(frame);
  });
}

function setupInteraction(){
  var el=document.querySelector('.graph-wrap');
  el.addEventListener('touchstart',function(e){
    if(e.touches.length===1){lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};isPinch=false;}
    else if(e.touches.length===2){isPinch=true;lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    if(e.touches.length===1&&lastTouch&&!isPinch){
      pan.x+=e.touches[0].clientX-lastTouch.x;pan.y+=e.touches[0].clientY-lastTouch.y;
      lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2&&lastDist){
      var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoom=Math.min(3,Math.max(0.4,zoom*(d/lastDist)));lastDist=d;
    }
  },{passive:true});
  el.addEventListener('touchend',function(){lastTouch=null;lastDist=null;},{passive:true});
  el.addEventListener('click',function(e){
    var rect=el.getBoundingClientRect();
    var W=el.clientWidth,H=el.clientHeight,cx=W/2,cy=H/2;
    var mx=((e.clientX-rect.left)-pan.x)/zoom,my=((e.clientY-rect.top)-pan.y)/zoom;
    var hit=nodes.find(function(nd){return !nd.trophy&&Math.hypot(nd.x-mx,nd.y-my)<18;});
    if(hit){
      document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
      document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
      document.querySelector('[data-view=matches]').classList.add('active');
      document.getElementById('view-matches').classList.add('active');
      setTimeout(function(){
        var idx=DATA.matches.findIndex(function(m){return m.id===hit.id;});
        var cards=document.querySelectorAll('.match-card');
        if(cards[idx])cards[idx].scrollIntoView({behavior:'smooth',block:'center'});
      },50);
    }
  });
  window.addEventListener('resize',function(){clearTimeout(window._r);window._r=setTimeout(resize,80);});
}

load();
})();
</script>
</body>
</html>
