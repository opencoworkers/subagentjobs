name: check

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: ""

jobs:
  rust:
    name: cargo check + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mold
        run: sudo apt-get install -y mold clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt,clippy
      - run: cargo check --workspace --exclude a2a-bridge
      - run: cargo clippy --workspace --exclude a2a-bridge -- -D warnings
      - run: cargo fmt --all -- --check
