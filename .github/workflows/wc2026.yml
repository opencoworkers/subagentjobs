name: wc2026 (subagentdata.com)

# Build + device-emulated render tests for the bracket worker on every PR
# (gates merge), then deploy to Cloudflare on merge to main.
on:
  push:
    branches: [main]
    paths: ['workers/wc2026-bracket/**', '.github/workflows/wc2026.yml']
  pull_request:
    paths: ['workers/wc2026-bracket/**', '.github/workflows/wc2026.yml']

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo (Cloudflare
# auth comes from CLOUDFLARE_API_TOKEN, not GITHUB_TOKEN).
permissions:
  contents: read

defaults:
  run:
    working-directory: workers/wc2026-bracket

jobs:
  build:
    name: build + render test (Chrome Canary)
    runs-on: ubuntu-latest
    env:
      # Install/auto-detect the experimental Canary build here.
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run check
      - name: Bundle (wrangler dry-run)
        run: npx wrangler deploy --dry-run --outdir dist
      - name: Install Chrome Canary (tip-of-tree) + deps
        run: npx playwright install --with-deps chromium-tip-of-tree
      - name: iPhone 16 Pro render tests
        run: npm run test:render

  deploy:
    name: deploy to Cloudflare
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --no-audit --no-fund
      - name: Skip if Cloudflare credentials are not configured
        id: gate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "No CLOUDFLARE_API_TOKEN secret — skipping deploy." >&2
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Inject Secrets Store id
        if: steps.gate.outputs.deploy == 'true' && vars.WC2026_SECRETS_STORE_ID != ''
        run: |
          sed -i "s/REPLACE_WITH_SECRETS_STORE_ID/${{ vars.WC2026_SECRETS_STORE_ID }}/" wrangler.toml
      - name: Apply D1 migrations
        if: steps.gate.outputs.deploy == 'true'
        run: |
          for f in migrations/*.sql; do
            echo "→ $f"
            npx wrangler d1 execute subagentjobs-dwh --remote --file "$f"
          done
      - name: Deploy worker
        if: steps.gate.outputs.deploy == 'true'
        run: npx wrangler deploy
