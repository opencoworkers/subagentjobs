# Vendor repos indexed locally for code search and context.
# Read-only: never commit these dirs. Populate with:
#   ./scripts/setup-vendors.sh
#
# Each repo is cloned to vendors/{org}/{repo} and indexed into:
#   fact_filesystem  — one row per file (SHA256, extension, size)
#   dim_file_ast     — symbols, imports, exports per file

[[vendor]]
org         = "Kuberwastaken"
repo        = "claurst"
url         = "https://github.com/Kuberwastaken/claurst"
branch      = "main"
description = "Rust rewrite of Claude Code — 9-crate workspace, 33 tools, ratatui TUI, multi-provider API"

[[vendor]]
org         = "modelcontextprotocol"
repo        = "servers"
url         = "https://github.com/modelcontextprotocol/servers"
branch      = "main"
description = "Official MCP reference servers (filesystem, git, postgres, brave-search, etc.)"

[[vendor]]
org         = "opencoworkers"
repo        = "subagentjobs"
url         = "https://github.com/opencoworkers/subagentjobs"
branch      = "main"
description = "This repo — self-indexed so the MCP server can search its own codebase"

[[vendor]]
org         = "microsoft"
repo        = "pg_durable"
url         = "https://github.com/microsoft/pg_durable"
branch      = "main"
description = "Durable execution inside PostgreSQL via pgrx — replaces hand-rolled task-state-machine FSM"

[[vendor]]
org         = "microsoft"
repo        = "duroxide"
url         = "https://github.com/microsoft/duroxide"
branch      = "main"
description = "Rust durable task framework (orchestration runtime) used by pg_durable"

[[vendor]]
org         = "microsoft"
repo        = "duroxide-pg"
url         = "https://github.com/microsoft/duroxide-pg"
branch      = "main"
description = "PostgreSQL-backed state provider for duroxide — persists instances/history in duroxide.* schema"

[[vendor]]
org         = "a2aproject"
repo        = "a2a-rs"
url         = "https://github.com/a2aproject/a2a-rs"
branch      = "main"
description = "A2A Rust SDK (packages: a2a-lf, a2a-client-lf, a2a-server-lf) — core types, axum HTTP server, async client. Not on crates.io yet; depend via git."

[[vendor]]
org         = "a2aproject"
repo        = "a2a-js"
url         = "https://github.com/a2aproject/a2a-js"
branch      = "main"
description = "@a2a-js/sdk v0.3.13 — Server & Client SDK for A2A. JSON-RPC + HTTP+JSON transports work in Cloudflare Workers; gRPC requires Node.js and is blocked."

[[vendor]]
org         = "modelcontextprotocol"
repo        = "typescript-sdk"
url         = "https://github.com/modelcontextprotocol/typescript-sdk"
branch      = "main"
description = "@modelcontextprotocol/sdk v1.29.0 — official TypeScript MCP SDK. Hono adapter makes it compatible with Cloudflare Workers."

[[vendor]]
org         = "modelcontextprotocol"
repo        = "rust-sdk"
url         = "https://github.com/modelcontextprotocol/rust-sdk"
branch      = "main"
description = "Official Rust MCP SDK — alternative to rmcp (which we currently use). Compare approaches before switching."

[[vendor]]
org         = "redis-rs"
repo        = "redis-rs"
url         = "https://github.com/redis-rs/redis-rs"
branch      = "main"
description = "Rust Redis client — v1.x async API with tokio-comp + connection-manager + json features. Examine Pipeline::query_async usage patterns here."

